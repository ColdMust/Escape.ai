<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMULACRO.EXE — RPG</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="scanlines"></div>
  <div class="app">
    <header class="title-bar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="title-text">SIMULACRO.EXE — terminal://setor-7</span>
      <span class="status-pill" id="hud">OFFLINE</span>
    </header>

    <div class="game-layout">
      <section class="panel-terminal">
        <div class="terminal-shell">
          <div class="terminal-toolbar">
            <span class="terminal-label">TERMINAL</span>
            <button type="button" class="terminal-scroll-btn" id="btn-scroll-bottom" title="Ir ao final">↓ Final</button>
          </div>
          <main class="terminal" id="terminal" aria-live="polite"></main>
        </div>
        <footer class="action-panel" id="action-panel">
          <p class="action-prompt" id="action-prompt"></p>
          <div class="action-buttons" id="action-buttons"></div>
          <form class="action-input-form hidden" id="action-input-form">
            <input type="text" id="action-input" autocomplete="off" spellcheck="false">
            <button type="submit">Enviar</button>
          </form>
        </footer>
      </section>
    </div>
  </div>

  <script src="js/ui.js"></script>
  <script src="js/ascii.js"></script>
  <script src="js/logic.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
